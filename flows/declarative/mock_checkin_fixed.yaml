name: "mock_checkin_fixed"
display_name: "模拟页固定签到流程"
description: "打开本地模拟页，填写执行账号，点击开始和确认，等待完成状态并保存截图。"
category: "并行测试"
version: 1
inputs:
  url:
    type: string
    label: "模拟页面网址"
    required: true
    default: "file:///Users/czyk/Documents/bit_browser_auto/scripts/mock_checkin_page.html?window=01"
    placeholder: "file:///Users/czyk/Documents/bit_browser_auto/scripts/mock_checkin_page.html?window=01"
  actor:
    type: string
    label: "执行账号"
    required: true
    default: "parallel-user-01"
steps:
  - action: goto
    url: "{{ inputs.url }}"
    wait_until: "domcontentloaded"
    timeout_ms: 60000
  - action: wait_for
    selector: "[data-testid='operator-input']"
    timeout_ms: 30000
  - action: fill
    selector: "[data-testid='operator-input']"
    value: "{{ inputs.actor }}"
    timeout_ms: 30000
  - action: click
    selector: "[data-testid='start-button']"
    timeout_ms: 30000
  - action: wait_for
    selector: "[data-testid='work-panel'][data-visible='true']"
    timeout_ms: 30000
  - action: click
    selector: "[data-testid='confirm-button']"
    timeout_ms: 30000
  - action: wait_for
    selector: "[data-testid='success-card'][data-visible='true']"
    timeout_ms: 30000
  - action: assert_text
    selector: "[data-testid='status-pill']"
    text: "已完成"
    timeout_ms: 30000
  - action: extract_text
    selector: "[data-testid='receipt-code']"
    save_as: "receipt_code"
    timeout_ms: 30000
  - action: screenshot
    name: "mock_checkin_final"
    full_page: true
