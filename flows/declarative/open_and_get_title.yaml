name: "open_and_get_title"
display_name: "打开网址并读取标题"
description: "在选中的账号窗口里打开目标网址，读取页面标题，并保存截图。"
category: "网页访问"
version: 1
inputs:
  url:
    type: string
    label: "目标网址"
    required: true
    default: "https://example.com"
    placeholder: "https://example.com"
    help: "每个已选账号窗口都会打开这个网址。"
steps:
  - action: goto
    url: "{{ inputs.url }}"
  - action: playwright
    target: page
    method: title
    save_as: title
  - action: screenshot
    name: "final"
    full_page: true
