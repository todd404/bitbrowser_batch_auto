display_name: "检测登录页并尝试登录"
description: "打开目标网址，检测登录表单是否出现，出现时填写账号密码并提交。"
category: "登录检查"
inputs:
  url:
    type: string
    label: "目标网址"
    required: true
    placeholder: "https://example.com/login"
  login_selector:
    type: string
    label: "登录表单选择器"
    required: false
    placeholder: "form"
  username_selector:
    type: string
    label: "用户名输入框选择器"
    required: false
  username:
    type: string
    label: "用户名"
    required: false
  password_selector:
    type: string
    label: "密码输入框选择器"
    required: false
  password:
    type: secret
    label: "密码"
    required: false
  submit_selector:
    type: string
    label: "提交按钮选择器"
    required: false
